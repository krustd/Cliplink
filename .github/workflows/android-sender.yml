name: Android Sender

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "android-sender/**"
      - ".github/workflows/android-sender.yml"
  push:
    branches:
      - main
    tags:
      - "android-sender-v*"
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        working-directory: android-sender
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cliplink-android-debug
          path: android-sender/app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build Signed Release APK
    if: startsWith(github.ref, 'refs/tags/android-sender-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/cliplink-release.keystore"

      - name: Build signed release APK
        working-directory: android-sender
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/cliplink-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: cliplink-android-release
          path: android-sender/app/build/outputs/apk/release/*.apk

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: android-sender/app/build/outputs/apk/release/*.apk
