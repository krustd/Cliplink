name: Receiver Release

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "receiver/**"
      - ".goreleaser.yaml"
      - ".github/workflows/receiver-release.yml"
  push:
    branches:
      - main
    tags:
      - "receiver-v*"
  workflow_dispatch:

jobs:
  test:
    name: Test Receiver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: receiver/go.mod
          cache-dependency-path: receiver/go.sum

      - name: Run tests
        working-directory: receiver
        run: go test ./...

  build-snapshot:
    name: Build Snapshot Artifacts
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/receiver-v')
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: receiver/go.mod
          cache-dependency-path: receiver/go.sum

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cliplinkd-snapshot
          path: dist/*

  release:
    name: Publish Receiver Release
    if: startsWith(github.ref, 'refs/tags/receiver-v')
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: receiver/go.mod
          cache-dependency-path: receiver/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
